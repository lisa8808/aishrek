<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 机械设计工作台 - 项目列表</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-left: 12px;
      font-weight: 400;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #0099cc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
    }
    .user-avatar:hover { border-color: rgba(0,217,255,0.4); }

    /* Personal center dropdown */
    .user-dropdown {
      display: none;
      position: fixed;
      top: 56px;
      right: 32px;
      width: 300px;
      background: #1e2a3a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .user-dropdown.show { display: block; }
    .user-dropdown-top {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .user-dropdown-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #0099cc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 10px;
    }
    .user-dropdown-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .user-dropdown-email { font-size: 12px; color: rgba(255,255,255,0.35); }
    .user-dropdown-section {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .user-dropdown-section:last-child { border-bottom: none; }
    .user-dropdown-section-title {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    .user-dropdown-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(0,217,255,0.15);
      color: #00d9ff;
    }
    .user-dropdown-tag.gold { background: rgba(255,200,0,0.15); color: #ffc800; }
    .user-dropdown-avatar-sm {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .user-dropdown-avatar-sm.a { background: #00d9ff; }
    .user-dropdown-avatar-sm.b { background: #ff6b6b; }
    .user-dropdown-avatar-sm.c { background: #00ff88; color: #000; }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .top-bar-left {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }
    .top-bar-left span {
      color: #00d9ff;
      font-weight: 600;
    }
    .search-input {
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #E5E7EB;
      font-size: 13px;
      font-family: inherit;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: rgba(0,217,255,0.4); }
    .search-input::placeholder { color: rgba(255,255,255,0.25); }

    /* New project button */
    .btn-new {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0,217,255,0.25);
    }
    .btn-new:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,217,255,0.35);
    }
    .btn-new:active { transform: translateY(0); }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* Project card */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 0;
      cursor: pointer;
      transition: all 0.25s;
      overflow: hidden;
      position: relative;
    }
    .card:hover {
      border-color: rgba(0,217,255,0.3);
      background: rgba(255,255,255,0.07);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .card-preview {
      height: 160px;
      background: rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: rgba(255,255,255,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .card-preview canvas {
      width: 100%;
      height: 100%;
    }
    .card-preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .card-preview-empty-text {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }

    .card-body {
      padding: 16px 18px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    .card-meta-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-file-count {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Card actions */
    .card-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .card-actions { opacity: 1; }
    .card-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
    }
    .card-action-btn:hover { background: rgba(0,0,0,0.7); color: #fff; }
    .card-action-btn.danger:hover { background: rgba(255,80,80,0.7); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
    .empty-title {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }
    .empty-hint {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 28px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1e2a3a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px 32px;
      width: 400px;
      max-width: 90vw;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    .modal-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: rgba(0,217,255,0.4); }
    .modal-textarea {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      outline: none;
      margin-bottom: 20px;
      resize: vertical;
      min-height: 60px;
      transition: border-color 0.2s;
    }
    .modal-textarea:focus { border-color: rgba(0,217,255,0.4); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-btn-cancel {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-btn-cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .modal-btn-confirm {
      background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
      color: #fff;
      font-weight: 600;
    }
    .modal-btn-confirm:hover { box-shadow: 0 4px 12px rgba(0,217,255,0.3); }

    /* Rename inline */
    .card-name-input {
      width: 100%;
      padding: 2px 6px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(0,217,255,0.4);
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      outline: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">
      ⚙️ AI 机械设计工作台
    </div>
    <div class="header-right">
      <div class="user-avatar" id="userAvatar" onclick="toggleUserDropdown(event)">👤</div>
    </div>
  </header>

  <!-- Personal center dropdown -->
  <div class="user-dropdown" id="userDropdown">
    <div class="user-dropdown-top">
      <div class="user-dropdown-avatar">👤</div>
      <div class="user-dropdown-name">用户</div>
      <div class="user-dropdown-email">user@example.com</div>
    </div>
    <div class="user-dropdown-section">
      <div class="user-dropdown-section-title">📋 账号信息</div>
      <div class="user-dropdown-item">账户类型 <span class="user-dropdown-tag">免费版</span></div>
      <div class="user-dropdown-item">到期时间 <span style="color:rgba(255,255,255,0.35);">无限期</span></div>
      <div class="user-dropdown-item">项目数量 <span style="color:rgba(255,255,255,0.35);">不限</span></div>
    </div>
    <div class="user-dropdown-section">
      <div class="user-dropdown-section-title">⭐ 增值服务</div>
      <div class="user-dropdown-item">AI 设计加速 <span class="user-dropdown-tag gold">升级</span></div>
      <div class="user-dropdown-item">高级几何分析 <span class="user-dropdown-tag">免费</span></div>
      <div class="user-dropdown-item">批量处理 <span class="user-dropdown-tag gold">升级</span></div>
    </div>
    <div class="user-dropdown-section">
      <div class="user-dropdown-section-title">👥 团队成员</div>
      <div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:rgba(255,255,255,0.7);">
        <div class="user-dropdown-avatar-sm a">A</div>
        <span>张三 · 管理员</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:rgba(255,255,255,0.7);">
        <div class="user-dropdown-avatar-sm b">B</div>
        <span>李四 · 编辑</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:rgba(255,255,255,0.7);">
        <div class="user-dropdown-avatar-sm c">C</div>
        <span style="color:rgba(255,255,255,0.3);">+ 邀请成员</span>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="top-bar">
      <div class="top-bar-left">项目列表 · 共 <span id="projectCount">0</span> 个项目</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input class="search-input" id="searchInput" placeholder="搜索项目..." oninput="renderProjects()">
        <button class="btn-new" onclick="createNewProjectAndRedirect()">+ 新建项目</button>
      </div>
    </div>

    <div class="card-grid" id="cardGrid">
      <!-- Cards rendered here -->
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">⚙️</div>
      <div class="empty-title">还没有项目</div>
      <div class="empty-hint">创建第一个项目，开始 AI 机械设计</div>
      <button class="btn-new" onclick="createNewProjectAndRedirect()">+ 新建项目</button>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">新建项目</div>
      <div class="modal-label">项目名称</div>
      <input class="modal-input" id="modalName" placeholder="例如：减速器壳体设计" maxlength="50" autofocus>
      <div class="modal-label">备注（可选）</div>
      <textarea class="modal-textarea" id="modalDesc" placeholder="项目说明..." maxlength="200"></textarea>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="hideModal()">取消</button>
        <button class="modal-btn modal-btn-confirm" onclick="createProject()">创建</button>
      </div>
    </div>
  </div>

  <script>
    const PROJECTS_KEY = 'stl_projects';

    function getProjects() {
      try { return JSON.parse(localStorage.getItem(PROJECTS_KEY) || '[]'); }
      catch (e) { return []; }
    }

    function saveProjects(projects) {
      localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
    }

    function showNewProjectModal() {
      document.getElementById('modalOverlay').classList.add('show');
      const nameInput = document.getElementById('modalName');
      nameInput.value = '';
      document.getElementById('modalDesc').value = '';
      setTimeout(() => nameInput.focus(), 100);
    }

    function hideModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }

    function createProject() {
      const name = document.getElementById('modalName').value.trim();
      const desc = document.getElementById('modalDesc').value.trim();
      if (!name) {
        document.getElementById('modalName').style.borderColor = '#ff6b6b';
        setTimeout(() => document.getElementById('modalName').style.borderColor = '', 1500);
        return;
      }

      const projects = getProjects();
      const project = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name: name,
        desc: desc,
        createdAt: Date.now(),
        updatedAt: Date.now(),
        fileCount: 0,
        versionCount: 0
      };
      projects.unshift(project);
      saveProjects(projects);
      hideModal();
      renderProjects();
    }

    function deleteProject(id, e) {
      e.stopPropagation();
      if (!confirm('确定删除该项目？项目内的文件历史也会被清除。')) return;

      const projects = getProjects().filter(p => p.id !== id);
      saveProjects(projects);

      // Clean up related localStorage
      try {
        const keys = Object.keys(localStorage);
        keys.forEach(key => {
          if (key.startsWith('stl_project_' + id)) localStorage.removeItem(key);
        });
      } catch (e) {}

      renderProjects();
    }

    function renameProject(id, e) {
      e.stopPropagation();
      const card = document.querySelector('.card[data-id="' + id + '"]');
      if (!card) return;
      const nameEl = card.querySelector('.card-name');
      const oldName = nameEl.textContent;

      const input = document.createElement('input');
      input.className = 'card-name-input';
      input.value = oldName;
      input.maxLength = 50;
      nameEl.replaceWith(input);
      input.focus();
      input.select();

      function finish() {
        const newName = input.value.trim() || oldName;
        const projects = getProjects();
        const proj = projects.find(p => p.id === id);
        if (proj) {
          proj.name = newName;
          proj.updatedAt = Date.now();
          saveProjects(projects);
        }
        renderProjects();
      }

      input.addEventListener('blur', finish);
      input.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') input.blur();
        if (ev.key === 'Escape') { input.value = oldName; input.blur(); }
      });
    }

    function openProject(id) {
      window.location.href = 'workspace.html?project=' + encodeURIComponent(id);
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      if (diffMs < 60000) return '刚刚';
      if (diffMs < 3600000) return Math.floor(diffMs / 60000) + '分钟前';
      if (diffMs < 86400000) return Math.floor(diffMs / 3600000) + '小时前';
      if (diffMs < 604800000) return Math.floor(diffMs / 86400000) + '天前';
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function renderProjects() {
      var projects = getProjects();
      var searchTerm = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      var filtered = searchTerm
        ? projects.filter(function(p) { return p.name.toLowerCase().includes(searchTerm) || (p.desc && p.desc.toLowerCase().includes(searchTerm)); })
        : projects;
      var grid = document.getElementById('cardGrid');
      var empty = document.getElementById('emptyState');
      var countEl = document.getElementById('projectCount');

      countEl.textContent = filtered.length;

      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        if (searchTerm) {
          empty.querySelector('.empty-title').textContent = '无匹配项目';
          empty.querySelector('.empty-hint').textContent = '尝试其他关键词';
        } else {
          empty.querySelector('.empty-title').textContent = '还没有项目';
          empty.querySelector('.empty-hint').textContent = '创建第一个项目，开始 AI 机械设计';
        }
        return;
      }

      grid.style.display = 'grid';
      empty.style.display = 'none';
      grid.innerHTML = '';

      filtered.forEach(function(proj) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = proj.id;
        card.onclick = () => openProject(proj.id);

        const fileCount = proj.fileCount || 0;
        const versionCount = proj.versionCount || 0;
        const descText = proj.desc ? '<div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(proj.desc) + '</div>' : '';

        card.innerHTML = ''
          + '<div class="card-preview">'
          + '  <div class="card-preview-empty">'
          + '    <span>⚙️</span>'
          + '    <span class="card-preview-empty-text">' + (fileCount > 0 ? fileCount + ' 个文件' : '暂无文件') + '</span>'
          + '  </div>'
          + '  <div class="card-actions">'
          + '    <button class="card-action-btn" title="重命名" onclick="renameProject(\'' + proj.id + '\', event)">✏️</button>'
          + '    <button class="card-action-btn danger" title="删除" onclick="deleteProject(\'' + proj.id + '\', event)">🗑️</button>'
          + '  </div>'
          + '</div>'
          + '<div class="card-body">'
          + '  <div class="card-name">' + escapeHtml(proj.name) + '</div>'
          + descText
          + '  <div class="card-meta">'
          + '    <div class="card-meta-left">'
          + '      <span class="card-file-count">📄 ' + fileCount + ' 文件</span>'
          + '      <span class="card-file-count">🔄 ' + versionCount + ' 版本</span>'
          + '    </div>'
          + '    <span>' + formatTime(proj.updatedAt) + '</span>'
          + '  </div>'
          + '</div>';

        grid.appendChild(card);
      });
    }

    function escapeHtml(s) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(s));
      return div.innerHTML;
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideModal();
    });

    // Enter key in modal
    document.getElementById('modalName').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') createProject();
    });

    // Init: if no projects, auto-create a default one and jump to workspace
    (function() {
      var projects = getProjects();
      if (projects.length === 0) {
        var project = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: '默认项目',
          desc: '',
          createdAt: Date.now(),
          updatedAt: Date.now(),
          fileCount: 0,
          versionCount: 0
        };
        projects.push(project);
        saveProjects(projects);
        window.location.href = 'workspace.html?project=' + encodeURIComponent(project.id);
        return;
      }
      renderProjects();
    })();

    // Create project locally and redirect to workspace
    function createNewProjectAndRedirect() {
      var projects = getProjects();
      var project = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name: '项目_' + new Date().toLocaleDateString(),
        desc: '',
        createdAt: Date.now(),
        updatedAt: Date.now(),
        fileCount: 0,
        versionCount: 0
      };
      projects.unshift(project);
      saveProjects(projects);
      window.location.href = 'workspace.html?project=' + encodeURIComponent(project.id);
    }

    // Personal center dropdown toggle
    function toggleUserDropdown(e) {
      e.stopPropagation();
      document.getElementById('userDropdown').classList.toggle('show');
    }
    document.addEventListener('click', function(e) {
      var dd = document.getElementById('userDropdown');
      var av = document.getElementById('userAvatar');
      if (dd.classList.contains('show') && !dd.contains(e.target) && e.target !== av) {
        dd.classList.remove('show');
      }
    });
  </script>
</body>
